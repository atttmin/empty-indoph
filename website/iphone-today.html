<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty · iPhone 今日伴读</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f7f4ed;
      --paper-2: #efe9dd;
      --ink: #1a1a1a;
      --ink-2: #4a4a4a;
      --ink-3: #7a7a7a;
      --vermilion: #c23a30;
      --vermilion-soft: rgba(194, 58, 48, 0.12);
      --card: #ffffff;
      --line: rgba(0, 0, 0, 0.06);
      --frame: #e4e2de;
      --frame-dark: #2a2a2a;
      --safe-top: 59px;
      --safe-bottom: 34px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #cfcbc3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* iPhone 15 Pro frame */
    .device {
      width: 402px;
      height: 874px;
      background: var(--frame-dark);
      border-radius: 58px;
      padding: 10px;
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.15) inset,
        0 0 0 1px rgba(0,0,0,0.25),
        0 50px 120px rgba(0,0,0,0.35),
        0 25px 40px rgba(0,0,0,0.2);
      position: relative;
      flex-shrink: 0;
    }

    .device::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 54px;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
      z-index: 10;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: var(--paper);
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 13px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    /* Status bar */
    .status-bar {
      height: var(--safe-top);
      padding: 14px 28px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      position: relative;
      z-index: 50;
    }

    .status-time { letter-spacing: 0.3px; }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .signal {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }
    .signal span {
      width: 3px;
      background: var(--ink);
      border-radius: 1px;
    }
    .signal span:nth-child(1) { height: 4px; }
    .signal span:nth-child(2) { height: 7px; }
    .signal span:nth-child(3) { height: 10px; }
    .signal span:nth-child(4) { height: 12px; }

    .wifi {
      width: 16px;
      height: 12px;
      position: relative;
    }
    .wifi::before {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      background: var(--ink);
      border-radius: 50%;
    }
    .wifi::after {
      content: "";
      position: absolute;
      bottom: 1px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 7px;
      border: 2px solid var(--ink);
      border-top-color: transparent;
      border-radius: 50%;
    }

    .battery {
      width: 25px;
      height: 12px;
      border: 1.5px solid var(--ink);
      border-radius: 3px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 1.5px;
    }
    .battery::after {
      content: "";
      position: absolute;
      right: -3px;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 5px;
      background: var(--ink);
      border-radius: 0 1px 1px 0;
    }
    .battery-level {
      width: 75%;
      height: 100%;
      background: var(--ink);
      border-radius: 1px;
    }

    /* App header */
    .app-header {
      padding: 8px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .greeting {
      display: flex;
      flex-direction: column;
    }
    .greeting-date {
      font-size: 12px;
      color: var(--ink-3);
      font-weight: 500;
      margin-bottom: 2px;
    }
    .greeting-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.5px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--paper-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Noto Serif SC", serif;
      font-size: 18px;
      color: var(--vermilion);
      border: 1px solid var(--line);
    }

    /* Scrollable content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px;
      scrollbar-width: none;
    }
    .content::-webkit-scrollbar { display: none; }

    /* Continue reading card */
    .hero-card {
      background: var(--card);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
      border: 1px solid var(--line);
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--vermilion);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-label::before {
      content: "";
      width: 6px;
      height: 6px;
      background: var(--vermilion);
      border-radius: 50%;
    }

    .book-row {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
    }

    .book-cover {
      width: 82px;
      height: 124px;
      border-radius: 8px;
      background: linear-gradient(135deg, #8b4513 0%, #5c2e0c 100%);
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .book-cover::after {
      content: "百年孤独";
      position: absolute;
      top: 16px;
      left: 10px;
      right: 10px;
      font-family: "Noto Serif SC", serif;
      font-size: 16px;
      color: rgba(255,255,255,0.95);
      line-height: 1.4;
    }
    .book-cover::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(255,255,255,0.15);
    }

    .book-meta {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      min-width: 0;
    }
    .book-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
      line-height: 1.25;
    }
    .book-author {
      font-size: 13px;
      color: var(--ink-3);
      margin-bottom: 12px;
    }
    .progress-wrap {
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 5px;
      background: var(--paper-2);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      width: 34%;
      height: 100%;
      background: var(--vermilion);
      border-radius: 3px;
    }
    .progress-text {
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 6px;
    }

    .continue-btn {
      width: 100%;
      height: 42px;
      background: var(--vermilion);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
    }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--card);
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
      border: 1px solid var(--line);
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 2px;
    }
    .stat-unit {
      font-size: 12px;
      color: var(--ink-3);
    }

    /* Feed */
    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .feed-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
    }
    .feed-more {
      font-size: 13px;
      color: var(--vermilion);
      font-weight: 600;
    }

    .feed-card {
      background: var(--card);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--line);
    }
    .feed-card:last-child { margin-bottom: 20px; }

    .quote {
      font-family: "Noto Serif SC", serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      margin-bottom: 10px;
      padding-left: 12px;
      border-left: 2px solid var(--vermilion);
    }
    .feed-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--ink-3);
    }
    .feed-tag {
      background: var(--vermilion-soft);
      color: var(--vermilion);
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 11px;
    }

    /* Bottom tab bar */
    .tab-bar {
      height: calc(var(--safe-bottom) + 58px);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding-top: 8px;
      position: relative;
      z-index: 50;
    }

    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      color: var(--ink-3);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
    }
    .tab.active { color: var(--vermilion); }

    .tab-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
    }

    /* Home indicator */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: var(--ink);
      border-radius: 3px;
      z-index: 60;
      opacity: 0.9;
    }

    /* Subtle texture */
    .texture {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(194,58,48,0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(139,69,19,0.02) 0%, transparent 45%);
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="dynamic-island"></div>

      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <div class="signal"><span></span><span></span><span></span><span></span></div>
          <div class="wifi"></div>
          <div class="battery"><div class="battery-level"></div></div>
        </div>
      </div>

      <div class="texture"></div>

      <header class="app-header">
        <div class="greeting">
          <span class="greeting-date">6月15日 星期日</span>
          <h1 class="greeting-title">今日伴读</h1>
        </div>
        <div class="avatar">朱</div>
      </header>

      <main class="content">
        <section class="hero-card">
          <div class="section-label">继续阅读</div>
          <div class="book-row">
            <div class="book-cover"></div>
            <div class="book-meta">
              <div class="book-title">百年孤独</div>
              <div class="book-author">加西亚 · 马尔克斯</div>
              <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill"></div></div>
                <div class="progress-text">第 4 章 · 已读 34%</div>
              </div>
            </div>
          </div>
          <button class="continue-btn">
            继续阅读
            <span>→</span>
          </button>
        </section>

        <section class="stats-row">
          <div class="stat-card">
            <div class="stat-value">42</div>
            <div class="stat-unit">分钟今日</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">128</div>
            <div class="stat-unit">页已读</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">7</div>
            <div class="stat-unit">条高亮</div>
          </div>
        </section>

        <section>
          <div class="feed-header">
            <h2 class="feed-title">朱批 · 最近</h2>
            <span class="feed-more">查看全部</span>
          </div>

          <article class="feed-card">
            <p class="quote">多年以后，面对行刑队，奥雷里亚诺·布恩迪亚上校将会回想起父亲带他去见识冰块的那个遥远的下午。</p>
            <div class="feed-meta">
              <span>《百年孤独》· 第 1 章</span>
              <span class="feed-tag">开场</span>
            </div>
          </article>

          <article class="feed-card">
            <p class="quote">家族的第一个人被捆在树上，最后一个人正被蚂蚁吃掉。</p>
            <div class="feed-meta">
              <span>《百年孤独》· 已存记忆</span>
              <span class="feed-tag">主题</span>
            </div>
          </article>

          <article class="feed-card">
            <p class="quote">失眠症最可怕之处不在于让人毫无倦意不能入睡，而是会不可逆转地恶化到更严重的境地：遗忘。</p>
            <div class="feed-meta">
              <span>《百年孤独》· 第 3 章</span>
              <span class="feed-tag">高亮</span>
            </div>
          </article>
        </section>
      </main>

      <nav class="tab-bar">
        <div class="tab active">
          <div class="tab-icon">📚</div>
          <span>书库</span>
        </div>
        <div class="tab">
          <div class="tab-icon">📖</div>
          <span>阅读</span>
        </div>
        <div class="tab">
          <div class="tab-icon">🃏</div>
          <span>卡片</span>
        </div>
        <div class="tab">
          <div class="tab-icon">朱</div>
          <span>朱批</span>
        </div>
        <div class="tab">
          <div class="tab-icon">👤</div>
          <span>我的</span>
        </div>
      </nav>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>

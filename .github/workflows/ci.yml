name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos-test:
    name: Build and Test (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build and run unit tests
        env:
          # GitHub-hosted runners ship an older macOS SDK than this project's
          # default 26.2 target. Override for CI so builds run on macos-latest.
          MACOSX_DEPLOYMENT_TARGET: "15.0"
          IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        run: |
          set -o pipefail
          xcodebuild test \
            -project Empty.xcodeproj \
            -scheme Empty \
            -destination 'platform=macOS' \
            -only-testing:EmptyTests \
            -skip-testing:EmptyUITests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty